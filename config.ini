[project]
name = sg
description = 智能售后客服 Agent
environment = sg
python_version = 3.11

[server]
host = 127.0.0.1
port = 8000
reload = true
log_level = info

[auth]
authorization_header = Authorization
token_prefix = Bearer
mock_valid_token = mock-user-token

[llm]
provider = openai_compatible
model = deepseek-chat
base_url = https://api.deepseek.com/v1
api_key_env = LLM_API_KEY
temperature = 0.2
timeout_seconds = 30

[mock_api]
base_url = http://127.0.0.1:8000
order_status_path = /api/order/status
refund_path = /api/order/refund
refund_failure_rate = 0.5
request_timeout_seconds = 10

[agent]
default_session_id_prefix = sess
enable_sse = true
enable_trace_log = true
max_history_messages = 20

[dependencies]
fastapi = >=0.115,<0.138
uvicorn = >=0.34,<0.50
langgraph = >=1.0,<2.0
langchain = >=1.0,<2.0
langchain-openai = >=1.0,<2.0
pydantic = >=2.7,<3.0
httpx = >=0.27,<1.0
python-dotenv = >=1.0

[conda]
create_command = conda create -n sg python=3.11 -y
activate_command = conda activate sg
install_command = pip install "fastapi>=0.115,<0.138" "uvicorn>=0.34,<0.50" "langgraph>=1.0,<2.0" "langchain>=1.0,<2.0" "langchain-openai>=1.0,<2.0" "pydantic>=2.7,<3.0" "httpx>=0.27,<1.0" "python-dotenv>=1.0"

